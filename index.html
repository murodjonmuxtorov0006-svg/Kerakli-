<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunlik Yordamchim - PRO MAX</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
            min-height: 100vh; 
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); margin-bottom: 5px; }
        #soat { 
            font-size: 30px; font-weight: bold; color: #fff; 
            background: rgba(0, 0, 0, 0.2); padding: 10px 20px; 
            border-radius: 10px; display: inline-block; letter-spacing: 2px;
        }

        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: flex-start; }
        
        .box { 
            background: #fff; padding: 25px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); width: 100%; max-width: 450px; 
        }
        .box h2 { margin-top: 0; color: #4a69bd; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        
        .timer-inputs { display: flex; gap: 5px; align-items: center; }
        .timer-inputs input { width: 30%; text-align: center; }
        .timer-inputs span { font-weight: bold; color: #7f8fa6; }

        input[type="text"], input[type="number"], textarea { 
            width: 100%; padding: 12px; border: 1px solid #dcdde1; 
            border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; transition: 0.3s; 
            box-sizing: border-box; 
        }
        
        input:focus, textarea:focus { border-color: #4a69bd; box-shadow: 0 0 8px rgba(74, 105, 189, 0.3); }
        textarea { height: 80px; resize: none; margin-bottom: 10px; }
        
        button { 
            background: #4a69bd; color: white; border: none; padding: 12px 18px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; 
        }
        button:hover { background: #3c55a5; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        h3 { color: #2f3640; font-size: 16px; margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        ul { list-style-type: none; padding: 0; margin: 0; max-height: 350px; overflow-y: auto; overflow-x: hidden; }
        
        li { 
            background: #f8f9fa; margin-bottom: 10px; padding: 12px; 
            border-radius: 8px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 4px solid #4a69bd; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); gap: 10px;
        }
        
        .content-box { display: flex; flex-direction: column; gap: 5px; width: 100%; min-width: 0; }
        
        .task-text, .note-text { 
            word-wrap: break-word; overflow-wrap: break-word; word-break: break-all; hyphens: auto; 
            font-size: 15px; cursor: pointer; transition: 0.3s; 
        }

        .task-text:hover { color: #4a69bd; }
        .completed { text-decoration: line-through; color: #a4b0be; font-style: italic; }

        .timer-badge { 
            font-size: 13px; background: #e1b12c; color: #fff; padding: 4px 10px; 
            border-radius: 12px; font-weight: bold; width: max-content; font-family: monospace; letter-spacing: 1px;
        }
        .timer-ended { background: #e55039; }

        .date-badge { font-size: 11px; color: #7f8fa6; font-style: italic; }
        
        .delete-btn { background: #e55039; padding: 8px 12px; border-radius: 6px; flex-shrink: 0; }
        .delete-btn:hover { background: #c0392b; transform: none; }
        
        ul::-webkit-scrollbar { width: 6px; }
        ul::-webkit-scrollbar-thumb { background-color: #dcdde1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Kunlik Yordamchim</h1>
        <div id="soat">00:00:00</div>
    </div>

    <div class="container">
        <div class="box">
            <h2>📝 Kunlik Rejalar</h2>
            <div class="input-group">
                <input type="text" id="yangi-vazifa" placeholder="Nima ish qilamiz?">
                <div class="timer-inputs">
                    <input type="number" id="soat-kiritish" placeholder="Soat" min="0" max="23">
                    <span>:</span>
                    <input type="number" id="minut-kiritish" placeholder="Min" min="0" max="59">
                    <span>:</span>
                    <input type="number" id="sekund-kiritish" placeholder="Sek" min="0" max="59">
                </div>
                <button onclick="vazifaQoshish()">Qo'shish</button>
            </div>
            <ul id="vazifalar-royxati"></ul>
        </div>

        <div class="box">
            <h2>📒 Tezkor Qaydlar</h2>
            <textarea id="bloknot" placeholder="Muhim ma'lumot, g'oya yoki parollarni yozing..."></textarea>
            <button onclick="qaydQoshish()" style="width: 100%;">Saqlash</button>
            
            <h3>💾 Saqlanganlar</h3>
            <ul id="qaydlar-royxati"></ul>
        </div>
    </div>

    <script>
        // SOAT
        setInterval(function() {
            let hozir = new Date();
            document.getElementById('soat').innerText = hozir.toLocaleTimeString('uz-UZ');
        }, 1000);

        // VAZIFALAR MANTIQI
        let vazifaRoyxati = document.getElementById('vazifalar-royxati');
        let vazifalarBazasi = JSON.parse(localStorage.getItem('proMaxVazifalarV3')) || [];
        let timerIntervals = [];

        // Ovozli signal (Budilnik ovozi)
        let alarmSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function ekrangaVazifalarniChiqarish() {
            vazifaRoyxati.innerHTML = '';
            timerIntervals.forEach(clearInterval);
            timerIntervals = [];

            vazifalarBazasi.forEach((vazifa, index) => {
                let taymerHTML = '';
                
                if (vazifa.qolganVaqt > 0) {
                    taymerHTML = `<span class="timer-badge" id="taymer-${index}">Hisoblanmoqda...</span>`;
                    taymerniBoshlash(index, vazifa.qolganVaqt);
                } else if (vazifa.qolganVaqt === 0) {
                    taymerHTML = `<span class="timer-badge timer-ended">Vaqt tugadi!</span>`;
                }

                let bajarilganClass = vazifa.bajarildi ? 'completed' : '';

                let li = `
                    <li>
                        <div class="content-box">
                            ${taymerHTML}
                            <span class="task-text ${bajarilganClass}" onclick="bajarildiQilish(${index})">${vazifa.matn}</span>
                        </div>
                        <button class="delete-btn" onclick="vazifaniOchirish(${index})">X</button>
                    </li>
                `;
                vazifaRoyxati.insertAdjacentHTML('beforeend', li);
            });
        }

        function taymerniBoshlash(index, jamiSekundlar) {
            let intervalId = setInterval(() => {
                if (jamiSekundlar <= 0) {
                    clearInterval(intervalId);
                    vazifalarBazasi[index].qolganVaqt = 0;
                    
                    // YANGILIK: Agar oldin ogohlantirilmagan bo'lsa, ogohlantiradi
                    if (!vazifalarBazasi[index].ogohlantirildi) {
                        alarmSound.play().catch(e => console.log("Brauzer ovozga ruxsat bermadi"));
                        
                        // Ekrandagi ma'lumotlar yangilanishiga ulgurishi uchun 100 millisekund kutamiz
                        setTimeout(() => {
                            alert("⏰ Siz belgilagan vaqtingiz tugadi!\n\nVazifa: " + vazifalarBazasi[index].matn);
                        }, 100);
                        
                        vazifalarBazasi[index].ogohlantirildi = true; // Faqat 1 marta chiqishi uchun belgilaymiz
                    }

                    vazifaSaqlash();
                    ekrangaVazifalarniChiqarish();
                    return;
                }

                jamiSekundlar--;
                vazifalarBazasi[index].qolganVaqt = jamiSekundlar;

                let s = Math.floor(jamiSekundlar / 3600);
                let m = Math.floor((jamiSekundlar % 3600) / 60);
                let sek = jamiSekundlar % 60;

                let formatlanganVaqt = `⏳ ${s.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sek.toString().padStart(2, '0')}`;
                
                let taymerElementi = document.getElementById(`taymer-${index}`);
                if (taymerElementi) {
                    taymerElementi.innerText = formatlanganVaqt;
                }
            }, 1000);
            
            timerIntervals.push(intervalId);
        }

        function vazifaQoshish() {
            let matn = document.getElementById('yangi-vazifa').value;
            let soat = Number(document.getElementById('soat-kiritish').value) || 0;
            let minut = Number(document.getElementById('minut-kiritish').value) || 0;
            let sekund = Number(document.getElementById('sekund-kiritish').value) || 0;
            
            if(matn.trim() === '') return; 

            let jamiSekundlar = (soat * 3600) + (minut * 60) + sekund;

            if (jamiSekundlar === 0 && soat === 0 && minut === 0 && sekund === 0) {
                jamiSekundlar = -1; 
            }

            vazifalarBazasi.unshift({
                matn: matn,
                bajarildi: false,
                qolganVaqt: jamiSekundlar,
                ogohlantirildi: false // Yangi vazifa hali ogohlantirilmadi
            });
            
            document.getElementById('yangi-vazifa').value = ''; 
            document.getElementById('soat-kiritish').value = ''; 
            document.getElementById('minut-kiritish').value = ''; 
            document.getElementById('sekund-kiritish').value = ''; 
            
            vazifaSaqlash();
            ekrangaVazifalarniChiqarish();
        }

        function vazifaniOchirish(index) {
            vazifalarBazasi.splice(index, 1);
            vazifaSaqlash();
            ekrangaVazifalarniChiqarish();
        }

        function bajarildiQilish(index) {
            vazifalarBazasi[index].bajarildi = !vazifalarBazasi[index].bajarildi;
            vazifaSaqlash();
            ekrangaVazifalarniChiqarish();
        }

        function vazifaSaqlash() {
            localStorage.setItem('proMaxVazifalarV3', JSON.stringify(vazifalarBazasi));
        }

        ekrangaVazifalarniChiqarish();

        // QAYDLAR MANTIQI
        let qaydRoyxati = document.getElementById('qaydlar-royxati');
        qaydRoyxati.innerHTML = localStorage.getItem('proMaxQaydlarV3') || '';

        function qaydQoshish() {
            let qaydMatni = document.getElementById('bloknot').value;
            if(qaydMatni.trim() === '') return;

            let sana = new Date().toLocaleString('uz-UZ');

            let li = `
                <li>
                    <div class="content-box">
                        <span class="date-badge">Sana: ${sana}</span>
                        <span class="note-text">${qaydMatni}</span> 
                    </div>
                    <button class="delete-btn" onclick="this.parentElement.remove(); qaydSaqlash()">X</button>
                </li>
            `;

            qaydRoyxati.insertAdjacentHTML('afterbegin', li);
            document.getElementById('bloknot').value = ''; 
            
            qaydSaqlash();
        }

        function qaydSaqlash() {
            localStorage.setItem('proMaxQaydlarV3', qaydRoyxati.innerHTML);
        }
    </script>

</body>
</html>
